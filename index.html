/* ============================================================================
   STORAGE LAYER — talks to /api (Cloudflare Pages Function over D1).
   Probes once on first use; if /api is unreachable, uses an in-memory map so
   the app still runs in preview (single device, non-persistent).
============================================================================ */
const API = "/api";
let ONLINE = true;
let _readyP = null;
const _mem = {};

async function probe() {
  try { const r = await fetch(API + "/ping", { cache: "no-store" }); ONLINE = r.ok; }
  catch { ONLINE = false; }
}
function ensure() { if (!_readyP) _readyP = probe(); return _readyP; }

async function sget(k) {
  await ensure();
  if (!ONLINE) { return _mem[k] !== undefined ? _mem[k] : null; }
  try {
    const r = await fetch(API + "/get?key=" + encodeURIComponent(k), { cache: "no-store" });
    if (!r.ok) return null;
    const d = await r.json();
    return d.value != null ? JSON.parse(d.value) : null;
  } catch { return null; }
}
async function sset(k, v) {
  await ensure();
  if (!ONLINE) { _mem[k] = v; return true; }
  try {
    await fetch(API + "/set", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ key: k, value: JSON.stringify(v) }) });
    return true;
  } catch { return false; }
}
async function slist(p) {
  await ensure();
  if (!ONLINE) { return Object.keys(_mem).filter((k) => k.startsWith(p)); }
  try {
    const r = await fetch(API + "/list?prefix=" + encodeURIComponent(p), { cache: "no-store" });
    if (!r.ok) return [];
    const d = await r.json();
    return d.keys || [];
  } catch { return []; }
}

/* ============================================================================

============================================================================ */
function App() {
  const [view, setView] = useState("boot");
  const [me, setMe] = useState(null);
  const [inbox, setInbox] = useState([]);
  const [tab, setTab] = useState("passport");
  const [toast, setToast] = useState(null);
  const [flash, setFlash] = useState(null);
  const [online, setOnline] = useState(true);
  const meRef = useRef(null);
  useEffect(() => { meRef.current = me; }, [me]);

  const ping = useCallback((m) => { setToast(m); setTimeout(() => setToast(null), 2200); }, []);

  useEffect(() => {
    (async () => {
      await ensure();
      setOnline(ONLINE);
      const q = (typeof window !== "undefined" ? window.location.search : "") || "";
      if (q.includes("screen")) { setView("screen"); return; }
      if (q.includes("admin")) { setView("admin"); return; }
      setView("landing");
    })();
  }, []);

  const refresh = useCallback(async (myRec) => {
    const rec = myRec || meRef.current;
    if (!rec) return;
    const keys = await slist("inbox:" + rec.id + ":");
    const evs = [];
    for (const k of keys) { const e = await sget(k); if (e) evs.push(e); }
    setInbox(evs);
    const fl = await sget("flash:current");
    setFlash(fl && fl.endsAt > Date.now() ? fl : null);
    let changed = false;
    const cons = [...(rec.connections || [])];
    for (const e of evs.filter((x) => x.type === "connection")) {
      if (!cons.some((c) => c.id === e.fromId)) { cons.push({ id: e.fromId, name: e.fromName, market: e.fromMarket, in: true }); changed = true; }
    }
    const tri = [...(rec.triviaWith || [])];
    for (const e of evs.filter((x) => x.type === "trivia")) {
      if (!tri.includes(e.fromId)) { tri.push(e.fromId); changed = true; }
    }
    let next = rec;
    if (changed) { next = { ...rec, connections: cons, triviaWith: tri }; }
    next = await applyAutoAwards(next, evs);
    setMe(next);
    if (changed || next !== rec) await sset("users:" + next.id, next);
    const finalTotal = (next.selfPoints || 0) + sum(evs, (e) => e.points);
    await sset("score:" + next.id, { id: next.id, name: next.name, market: next.market, total: finalTotal, charity: next.charity || "" });
  }, []);

  useEffect(() => {
    if (view !== "app" || !me) return;
    refresh(me);
    const t = setInterval(() => refresh(), 20000);
    return () => clearInterval(t);
    // eslint-disable-next-line
  }, [view, me && me.id]);

  const total = (me ? me.selfPoints || 0 : 0) + sum(inbox, (e) => e.points);
  const collected = me ? collectedMarkets(me) : [];

  const offlineBar = !online ? <div className="offline">Preview mode — no backend reachable. Single device, not saved. Deploy with /api for live play.</div> : null;

  if (view === "boot") return (<><Styles /><div className="gcq"><div className="wrap" style={{ justifyContent: "center", color: "#9fb4bd" }}>Loading…</div></div></>);
  if (view === "screen") return (<><Styles /><BigScreen onExit={() => setView("landing")} /></>);
  if (view === "admin") return (<><Styles /><Admin onExit={() => setView("landing")} /></>);
  if (view === "landing") return (<><Styles />{offlineBar}<Landing onAuthed={(rec) => { setMe(rec); setView("app"); refresh(rec); }} onAdmin={() => setView("admin")} onRegister={() => setView("register")} onScreen={() => setView("screen")} /></>);
  if (view === "register") return (<><Styles />{offlineBar}<Register onDone={(rec) => { setMe(rec); setView("app"); refresh(rec); }} onBack={() => setView("landing")} /></>);

  return (
    <div className="gcq">
      <Styles />
      {offlineBar}
      <div className="wrap" style={{ paddingTop: online ? 0 : 18 }}>
        <div style={{ flex: 1, paddingTop: 16, paddingBottom: 12 }}>
          {flash && <div className="flash" style={{ marginBottom: 14 }}>⚡ {flash.title} — {flash.desc}{flash.mult > 1 ? `  (×${flash.mult} points!)` : ""}</div>}
          {tab === "passport" && <Passport me={me} total={total} inbox={inbox} collected={collected} ping={ping} setMe={setMe} refresh={refresh} />}
          {tab === "connect" && <Connect me={me} flash={flash} ping={ping} setMe={setMe} refresh={refresh} collected={collected} />}
          {tab === "quiz" && <Trivia me={me} ping={ping} setMe={setMe} refresh={refresh} />}
          {tab === "learn" && <Learn me={me} ping={ping} setMe={setMe} refresh={refresh} />}
          {tab === "missions" && <Missions me={me} total={total} ping={ping} setMe={setMe} refresh={refresh} />}
        </div>
        <div className="nav">
          {[["passport", "Passport"], ["connect", "Connect"], ["quiz", "Quiz"], ["learn", "Learn"], ["missions", "Missions"]].map(([k, l]) => (
            <button key={k} className={"tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}>
              <TabIcon name={k} /><span>{l}</span><span className="dot" />
            </button>
          ))}
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

   DERIVATIONS
============================================================================ */
function collectedMarkets(me) {
  const s = new Set();
  (me.connections || []).forEach((c) => { if (c.market) s.add(c.market); });
  return [...s];
}
async function applyAutoAwards(rec, evs) {
  let next = rec;
  const cols = collectedMarkets(next);
  if (cols.length >= 3 && !next.trioAwarded) {
    next = { ...next, trioAwarded: true, selfPoints: (next.selfPoints || 0) + PTS.trioBonus, missions: { ...next.missions, m_3market: true } };
  }
  if (cols.length >= MARKETS.length && !next.fullAwarded) {
    next = { ...next, fullAwarded: true, selfPoints: (next.selfPoints || 0) + PTS.fullPassport };
  }
  return next;
}

/* ---- Passport stamp visuals ---------------------------------------------- */
function octagon(cx, cy, r) {
  const p = [];
  for (let k = 0; k < 8; k++) { const a = Math.PI / 8 + k * Math.PI / 4; p.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`); }
  return p.join(" ");
}
function StampSVG({ market, idx, color }) {
  const code = codeFor(market);
  const shape = idx % 4;
  const glyph = GLYPHS[idx % GLYPHS.length];
  const ring = (sw) => {
    const r1 = 44, r2 = 36;
    if (shape === 0) return (<><circle cx="50" cy="50" r={r1} fill="none" stroke={color} strokeWidth={sw} /><circle cx="50" cy="50" r={r2} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
    if (shape === 1) { const a = 50 - r1, b = 2 * r1, c = 50 - r2, d = 2 * r2; return (<><rect x={a} y={a} width={b} height={b} rx="14" fill="none" stroke={color} strokeWidth={sw} /><rect x={c} y={c} width={d} height={d} rx="10" fill="none" stroke={color} strokeWidth={sw * 0.7} /></>); }
    if (shape === 2) return (<><ellipse cx="50" cy="50" rx={r1} ry={r1 * 0.8} fill="none" stroke={color} strokeWidth={sw} /><ellipse cx="50" cy="50" rx={r2} ry={r2 * 0.8} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
    return (<><polygon points={octagon(50, 50, r1)} fill="none" stroke={color} strokeWidth={sw} /><polygon points={octagon(50, 50, r2)} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
  };
  return (
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g style={{ opacity: 0.92 }}>
        {ring(2.6)}
        <text x="50" y="30" textAnchor="middle" fontSize="11" fill={color}>{glyph}</text>
        <text x="50" y="60" textAnchor="middle" fontSize="23" fontWeight="700" fill={color} fontFamily="'Space Mono',monospace" letterSpacing="1">{code}</text>
        <text x="50" y="76" textAnchor="middle" fontSize="8" fill={color} fontFamily="'Space Mono',monospace" letterSpacing="1.5">TOKYO &#8217;26</text>
      </g>
    </svg>
  );
}
function LockedSVG({ market }) {
  const code = codeFor(market);
  return (
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--line)" strokeWidth="2" strokeDasharray="3 5" />
      <text x="50" y="58" textAnchor="middle" fontSize="20" fontWeight="700" fill="#c9bd9f" fontFamily="'Space Mono',monospace" letterSpacing="1">{code}</text>
    </svg>
  );
}
function Stamp({ market, idx, on }) {
  const rot = ((idx * 37) % 19) - 9;
  const color = INK[idx % INK.length];
  return (
    <div className={"stmpwrap" + (on ? " got" : "")}>
      <div className={"stmp" + (on ? " on" : " locked")}>
        {on
          ? <div className="inkrot" style={{ transform: `rotate(${rot}deg)` }}><div className="ink"><StampSVG market={market} idx={idx} color={color} /></div></div>
          : <div className="inkrot"><div style={{ width: "82%", height: "82%", opacity: 0.6 }}><LockedSVG market={market} /></div></div>}
      </div>
      <span className="stmp-name">{market}</span>
    </div>

}
function ProgressRing({ pct }) {
  const r = 26, c = 2 * Math.PI * r;
  return (
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r={r} fill="none" stroke="var(--paper2)" strokeWidth="7" />

/* ============================================================================
   CONNECT
============================================================================ */
function Connect({ me, flash, ping, setMe, refresh, collected }) {
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [match, setMatch] = useState(null);

  async function connect() {
    const c = code.trim();
    if (!/^\d{4}$/.test(c)) { ping("Enter a 4-digit code"); return; }
    if (c === me.code) { ping("That's your own code!"); return; }
    setBusy(true);
    const idx = await sget("code:" + c);
    if (!idx) { setBusy(false); ping("Code not found"); return; }
    if ((me.connections || []).some((x) => x.id === idx.id)) { setBusy(false); ping("Already connected with " + idx.name); setCode(""); return; }

    const mult = flash && flash.mult > 1 ? flash.mult : 1;
    const isNewMarket = !collected.includes(idx.market) && idx.market !== me.market;
    let earned = PTS.connect + (isNewMarket ? PTS.newMarket : 0);
    earned = earned * mult;

    const next = {
      ...me,
      selfPoints: (me.selfPoints || 0) + earned,
      connections: [...(me.connections || []), { id: idx.id, name: idx.name, market: idx.market }],
      missions: { ...me.missions, m_code: true, m_coffee: me.missions.m_coffee || isNewMarket },
    };
    setMe(next); await sset("users:" + me.id, next);
    const ev = { id: eid(), type: "connection", points: PTS.connect * mult, fromId: me.id, fromName: me.name, fromMarket: me.market, ts: Date.now() };
    await sset("inbox:" + idx.id + ":" + ev.id, ev);
    setBusy(false); setCode("");
    ping(`+${earned} — connected with ${idx.name}!`);
    refresh(next);
  }

  async function findMatch() {
    const keys = await slist("users:");
    const pool = [];
    for (const k of keys) { const u = await sget(k); if (u && u.id !== me.id && !(me.connections || []).some((c) => c.id === u.id)) pool.push(u); }
    if (!pool.length) { ping("No new people to match yet"); return; }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    setMatch(pick);
  }

  return (
    <div>
      <div className="eyebrow">Connect</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Meet someone new</h2>

      <div className="card">
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Enter a peer's Connect Code</div>
        <input className="input mono" style={{ marginTop: 8, fontSize: 22, letterSpacing: ".3em", textAlign: "center" }}
          value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 4))}
          placeholder="0000" inputMode="numeric" />
        <button className="btn btn-primary" style={{ marginTop: 10 }} onClick={connect} disabled={busy}>
          {busy ? "Connecting…" : "Connect & score"}
        </button>
        <p className="muted" style={{ fontSize: 12, marginTop: 8, textAlign: "center" }}>
          +{PTS.connect} each · +{PTS.newMarket} extra if they're a new market{flash && flash.mult > 1 ? ` · ×${flash.mult} flash bonus live!` : ""}
        </p>
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Random match</div>
        <p className="muted" style={{ fontSize: 13, margin: "4px 0 10px" }}>Get paired with a colleague you haven't met, then go find them.</p>
        <button className="btn btn-ghost" onClick={findMatch}>Find me a match</button>
        {match && (
          <div style={{ marginTop: 12, borderTop: "1px solid var(--line)", paddingTop: 12 }}>
            <p style={{ fontWeight: 800, fontSize: 17 }}>{match.name}</p>
            <p className="muted" style={{ fontSize: 13 }}>{match.market}{match.nationality ? ` · ${match.nationality}` : ""}</p>
            {match.hobbies && <p style={{ fontSize: 13, marginTop: 6 }}>Ask them about: <b>{match.hobbies.filter(Boolean)[0]}</b></p>}
            <p className="muted" style={{ fontSize: 12, marginTop: 6 }}>Find them, swap codes, and connect above.</p>
          </div>
        )}
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>People you've met ({(me.connections || []).length})</div>
        {(me.connections || []).length === 0
          ? <p className="muted" style={{ fontSize: 13, marginTop: 6 }}>No connections yet — go say hello.</p>
          : <div style={{ marginTop: 8 }}>{(me.connections || []).map((c, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid var(--line)", fontSize: 14 }}>
                <span style={{ fontWeight: 600 }}>{c.name}</span><span className="pill">{c.market}</span>
              </div>))}</div>}
      </div>
    </div>
  );
}

function Trivia({ me, ping, setMe, refresh }) {
  const [stage, setStage] = useState("intro");
  const [peer, setPeer] = useState(null);
  const [code, setCode] = useState("");
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [picked, setPicked] = useState(null);
  const [time, setTime] = useState(60);
  const tref = useRef(null);
  const correctRef = useRef(0);

  function buildQuestions() {
    const hobbyPool = ["Skiing", "Cycling", "Painting", "Gardening", "Chess", "Running", "Baking", "Photography", "Yoga", "Surfing"];
    const realHobby = (me.hobbies || []).filter(Boolean)[0] || "Reading";
    const hobbyOpts = shuffle([realHobby, ...pickN(hobbyPool.filter((h) => h !== realHobby), 2)]);
    const placeOpts = shuffle([me.exotic || "Iceland", ...pickN(PLACE_POOL.filter((p) => p !== me.exotic), 2)]);
    const marketOpts = shuffle([me.market, ...pickN(MARKETS.filter((m) => m !== me.market), 2)]);
    return [
      { q: `Which hobby belongs to ${me.name}?`, options: hobbyOpts, a: hobbyOpts.indexOf(realHobby) },
      { q: `Where is the most exotic place ${me.name} has visited?`, options: placeOpts, a: placeOpts.indexOf(me.exotic || "Iceland") },
      { q: `Which is ${me.name}'s home market?`, options: marketOpts, a: marketOpts.indexOf(me.market) },
    ];
  }

  async function lockPeer() {
    const c = code.trim();
    if (!/^\d{4}$/.test(c) || c === me.code) { ping("Enter a valid peer code"); return; }
    const idx = await sget("code:" + c);
    if (!idx) { ping("Code not found"); return; }
    if ((me.triviaWith || []).includes(idx.id)) { ping("Already quizzed " + idx.name); return; }
    setPeer(idx); setQs(buildQuestions()); setStage("run"); setQi(0); setCorrect(0); correctRef.current = 0; setTime(60);
  }

  useEffect(() => {
    if (stage !== "run") return;
    tref.current = setInterval(() => setTime((t) => { if (t <= 1) { clearInterval(tref.current); finish(correctRef.current); return 0; } return t - 1; }), 1000);
    return () => clearInterval(tref.current);
    // eslint-disable-next-line
  }, [stage]);

  function answer(i) {
    if (picked !== null) return;
    setPicked(i);
    const ok = i === qs[qi].a;
    const nc = correct + (ok ? 1 : 0);
    if (ok) setCorrect(nc);
    correctRef.current = nc;
    setTimeout(() => {
      setPicked(null);
      if (qi + 1 < qs.length) setQi(qi + 1);
      else { clearInterval(tref.current); finish(nc); }
    }, 900);
  }

  async function finish(nc) {
    setStage("done");
    const hostPts = PTS.triviaHost;
    const guesserPts = nc * PTS.triviaCorrect;
    const next = { ...me, selfPoints: (me.selfPoints || 0) + hostPts, triviaWith: [...(me.triviaWith || []), peer.id], missions: { ...me.missions, m_trivia: true } };
    setMe(next); await sset("users:" + me.id, next);
    if (guesserPts > 0) {
      const ev = { id: eid(), type: "trivia", points: guesserPts, fromId: me.id, fromName: me.name, fromMarket: me.market, ts: Date.now() };
      await sset("inbox:" + peer.id + ":" + ev.id, ev);
    }
    refresh(next);
  }

  if (stage === "intro") return (
    <div>
      <div className="eyebrow">Peer Pop Quiz</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Challenge a peer</h2>

        </div>
        <button className="btn btn-primary" onClick={() => setStage("code")}>Start a quiz</button>
      </div>
    </div>
  );

  if (stage === "code") return (
    <div>
      <div className="eyebrow">Peer Pop Quiz</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Who's playing?</h2>
      <div className="card">
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Enter your guesser's Connect Code</div>
        <input className="input mono" style={{ marginTop: 8, fontSize: 22, letterSpacing: ".3em", textAlign: "center" }}
          value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="0000" inputMode="numeric" />
        <button className="btn btn-primary" style={{ marginTop: 10 }} onClick={lockPeer}>Generate quiz & hand over phone</button>
        <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={() => setStage("intro")}>Cancel</button>
      </div>
    </div>
  );

  if (stage === "run") {
    const q = qs[qi];
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span className="pill">Question {qi + 1}/3</span>
          <span className="timer" style={{ color: time <= 10 ? "var(--seal)" : "#fff", fontSize: 30 }}>{time}s</span>
        </div>
        <div className="card">
          <p style={{ fontWeight: 800, fontSize: 18, marginBottom: 14 }}>{q.q}</p>
          {q.options.map((o, i) => (
            <button key={i} className={"opt" + (picked !== null && i === q.a ? " correct" : picked === i && i !== q.a ? " wrong" : "")}
              onClick={() => answer(i)}>{o}</button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="eyebrow">Peer Pop Quiz</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Time!</h2>
      <div className="card" style={{ textAlign: "center" }}>
        <div style={{ fontSize: 48 }}>{correct === 3 ? "🏆" : correct >= 1 ? "🎉" : "🤝"}</div>
        <p style={{ fontWeight: 800, fontSize: 20, margin: "8px 0" }}>{correct}/3 correct</p>
        <p className="muted" style={{ fontSize: 14 }}>{peer && peer.name} earned +{correct * PTS.triviaCorrect}. You earned +{PTS.triviaHost} for connecting.</p>
        <button className="btn btn-primary" style={{ marginTop: 14 }} onClick={() => { setStage("intro"); setCode(""); setPeer(null); }}>Quiz someone else</button>
      </div>
    </div>
  );
}
function shuffle(a) { const x = [...a]; for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [x[i], x[j]] = [x[j], x[i]]; } return x; }
function pickN(a, n) { return shuffle(a).slice(0, n); }

function SelfQuiz({ title, questions, done, onComplete, ping }) {
  const [open, setOpen] = useState(false);
  const [qi, setQi] = useState(0);
  const [score, setScore] = useState(0);
  const [picked, setPicked] = useState(null);
  function answer(i) {
    if (picked !== null) return;
    setPicked(i);
    const ok = i === questions[qi].a;
    const ns = score + (ok ? 1 : 0);
    if (ok) setScore(ns);
    setTimeout(() => {
      setPicked(null);
      if (qi + 1 < questions.length) setQi(qi + 1);
      else { onComplete(ns); setOpen(false); setQi(0); setScore(0); }
    }, 800);
  }
  return (
    <div className="card" style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <p style={{ fontWeight: 800 }}>{title}</p>
        {done ? <span className="pill" style={{ background: "#e9f7f0", color: "var(--green)" }}>Completed ✓</span>
          : <button className="btn btn-primary" style={{ width: "auto", padding: "8px 14px", fontSize: 13 }} onClick={() => setOpen(true)}>Start</button>}
      </div>
      {open && (
        <div style={{ marginTop: 12 }}>
          <div className="eyebrow" style={{ color: "var(--navy)" }}>Question {qi + 1}/{questions.length}</div>
          <p style={{ fontWeight: 700, margin: "8px 0 10px" }}>{questions[qi].q}</p>
          {questions[qi].options.map((o, i) => (
            <button key={i} className={"opt" + (picked !== null && i === questions[qi].a ? " correct" : picked === i ? " wrong" : "")} onClick={() => answer(i)}>{o}</button>
          ))}
        </div>
      )}
    </div>
  );
}

                </div>
                <p style={{ fontSize: 13, margin: "6px 0" }}>Self points: <b>{total}</b> <span className="muted">(inbound credits add on top)</span></p>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, 50)}>+50</button>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, -50)}>−50</button>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, 10)}>+10</button>
                </div>
                <p className="muted" style={{ fontSize: 12, marginTop: 6 }}>Phone died? They simply sign in again with <b>{u.email}</b> to restore this passport and code.</p>
              </div>
            );
          })}
          {search && filtered.length === 0 && <p className="muted" style={{ fontSize: 13, marginTop: 8 }}>No match.</p>}
        </div>
      </div>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
