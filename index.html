const sleep=(ms)=>new Promise((res)=>setTimeout(res,ms));
async function sbFetch(path,opts){let lastErr=null;for(let a=0;a<4;a++){const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),8000);try{const r=await fetch(SUPABASE_URL+path,{...opts,signal:ctrl.signal});clearTimeout(timer);if(r.ok)return r;if(r.status===429||r.status>=500){lastErr=r;await sleep(400*(a+1));continue;}return r;}catch(e){clearTimeout(timer);lastErr=e;await sleep(400*(a+1));}}if(lastErr instanceof Response)return lastErr;throw lastErr||new Error("request failed");}
async function sget(k){try{const r=await sbFetch("/rest/v1/kv?select=value&key=eq."+encodeURIComponent(k),{headers:sbHeaders()});const rows=await r.json();return rows&&rows.length?rows[0].value:null;}catch{return null;}}
async function sset(k,v){try{const r=await sbFetch("/rest/v1/kv",{method:"POST",headers:sbHeaders({Prefer:"resolution=merge-duplicates,return=minimal"}),body:JSON.stringify({key:k,value:v})});return r.ok;}catch{return false;}}
async function slist(prefix){const out=[];let offset=0;const PAGE=1000;try{for(;;){const r=await sbFetch("/rest/v1/kv?select=key&order=key.asc&limit="+PAGE+"&offset="+offset+"&key=like."+encodeURIComponent(prefix)+"*",{headers:sbHeaders()});const rows=await r.json();if(!Array.isArray(rows)||rows.length===0)break;for(const x of rows)out.push(x.key);if(rows.length<PAGE)break;offset+=PAGE;}}catch{}return out;}
async function sgetAll(prefix){const out=[];let offset=0;const PAGE=1000;try{for(;;){const r=await sbFetch("/rest/v1/kv?select=value&order=key.asc&limit="+PAGE+"&offset="+offset+"&key=like."+encodeURIComponent(prefix)+"*",{headers:sbHeaders()});const rows=await r.json();if(!Array.isArray(rows)||rows.length===0)break;for(const x of rows){if(x&&x.value)out.push(x.value);}if(rows.length<PAGE)break;offset+=PAGE;}}catch{}return out;}
async function sgetAllKV(prefix){const out=[];let offset=0;const PAGE=1000;try{for(;;){const r=await sbFetch("/rest/v1/kv?select=key,value&order=key.asc&limit="+PAGE+"&offset="+offset+"&key=like."+encodeURIComponent(prefix)+"*",{headers:sbHeaders()});const rows=await r.json();if(!Array.isArray(rows)||rows.length===0)break;for(const x of rows){if(x&&x.value)out.push({key:x.key,value:x.value});}if(rows.length<PAGE)break;offset+=PAGE;}}catch{}return out;}

const rankFor = (p) => { let r = RANKS[0]; for (const x of RANKS) if (p >= x.min) r = x; return r; };
const nextRank = (p) => RANKS.find((x) => x.min > p) || null;
async function genCode() {
  for (let i = 0; i < 12; i++) {
    const c = String(Math.floor(100 + Math.random() * 900));
    const exists = await sget("code:" + c);
    if (!exists) return c;
  }
  return String(Math.floor(100 + Math.random() * 900));
}

// Smoothly animate a displayed number toward a target when it changes.
function useCountUp(target) {
  const [val, setVal] = useState(target);
  const fromRef = useRef(target);
  useEffect(() => {
    const from = fromRef.current, to = target;
    fromRef.current = to;
    if (from === to) { setVal(to); return; }
    const dur = 600, t0 = (typeof performance !== "undefined" ? performance.now() : Date.now());
    let raf;
    const tick = (t) => {
      const k = Math.min(1, ((t || Date.now()) - t0) / dur);
      const e = 1 - Math.pow(1 - k, 3);
      setVal(Math.round(from + (to - from) * e));
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return val;
}

// Global announcement bar — polls announce:current and shows on every view
// (all app tabs, big screen, landing, register). Logistics, not game mechanics.
function AnnounceBar() {
  const [ann, setAnn] = useState(null);
  const [dismissed, setDismissed] = useState(null); // id the user closed locally
  const barRef = useRef(null);
  useEffect(() => {
    let live = true;
    const poll = async () => {
      const a = await sget("announce:current");
      if (!live) return;
      setAnn(a && a.endsAt > Date.now() ? a : null);
    };
    poll();
    const t = setInterval(poll, 15000);
    return () => { live = false; clearInterval(t); };
  }, []);
  const shown = !!(ann && ann.id !== dismissed);
  // Reserve the bar's real height (it can wrap on small screens) plus breathing
  // room, exposed as --annH so the spacer below and the sticky points header
  // both clear the fixed bar.
  useEffect(() => {
    const root = typeof document !== "undefined" ? document.documentElement : null;
    if (!root) return;
    if (!shown) { root.style.setProperty("--annH", "0px"); return; }
    const measure = () => { if (barRef.current) root.style.setProperty("--annH", (barRef.current.offsetHeight + 14) + "px"); };
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, [shown, ann]);
  if (!shown) return null;
  return (
    <>
      <div className="announce" ref={barRef}>
        <span className="ann-ico">📣</span>
        <span>{ann.text}</span>
        <span className="ann-x" onClick={() => setDismissed(ann.id)}>×</span>
      </div>
      <div aria-hidden="true" style={{ height: "var(--annH, 60px)" }} />
    </>
  );
}

function App() {
  const [view, setView] = useState("boot"); // boot | landing | register | app | admin | screen
  const [me, setMe] = useState(null);       // users:{id} record on this device
  const [inbox, setInbox] = useState([]);   // inbound point events for me
  const [tab, setTab] = useState("passport");
  const [toast, setToast] = useState(null);
  const [flash, setFlash] = useState(null);
  const [connAlert, setConnAlert] = useState(null);
  const [backable, setBackable] = useState(false);
  const [knewAsk, setKnewAsk] = useState(null); // {name} -> "did you already know them?"
  const navStack = useRef([]);
  const tabRef = useRef("passport");
  const meRef = useRef(null);
  const seenInbox = useRef(null); // Set of event keys already seen (null = not yet seeded)
  useEffect(() => { meRef.current = me; }, [me]);
  useEffect(() => { tabRef.current = tab; }, [tab]);

  // ---- In-app tab navigation with device + on-screen Back -------------------
  // Each tab change pushes a guard entry onto browser history. Device back (and
  // the on-screen arrow, which calls history.back) pops the in-app stack first,
  // only leaving the app once you're back at the tab you opened on.
  const navTo = useCallback((next) => {
    if (next === tabRef.current) return;
    navStack.current.push(tabRef.current);
    setBackable(true);
    try { window.history.pushState({ gcqNav: true }, ""); } catch {}
    setTab(next);
  }, []);

  useEffect(() => {
    if (view !== "app") return;
    navStack.current = [];
    setBackable(false);
    try { window.history.pushState({ gcqRoot: true }, ""); } catch {}
    const onPop = () => {
      if (navStack.current.length > 0) {
        const prev = navStack.current.pop();
        setBackable(navStack.current.length > 0);
        setTab(prev);
        try { window.history.pushState({ gcqNav: true }, ""); } catch {}
      } else {
        // at the opening tab: a further back leaves the app
        setView("landing");
      }
    };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, [view]);
  const goBack = useCallback(() => { try { window.history.back(); } catch {} }, []);

  // Always land at the top so the points header is pinned at the top of the screen
  // on sign-in and on every tab change (then it stays put via position:sticky).
  useEffect(() => {
    if (view !== "app") return;
    try { if ("scrollRestoration" in window.history) window.history.scrollRestoration = "manual"; } catch {}
    const jump = () => { try { window.scrollTo(0, 0); } catch {} };
    jump();
    const r = requestAnimationFrame(jump);
    const t = setTimeout(jump, 60);
    return () => { cancelAnimationFrame(r); clearTimeout(t); };
  }, [view, tab]);

  // ask "did you already know them?" after a new connection (Connect + Quiz)
  const askKnew = useCallback((name) => { setKnewAsk({ name }); }, []);
  const answerKnew = useCallback(async (knew) => {
    const rec = meRef.current;
    setKnewAsk(null);
    if (!rec) return;
    const next = {
      ...rec,
      metBeforeAsked: true,
      newConnections: (rec.newConnections || 0) + (knew ? 0 : 1),
      knownContacts: (rec.knownContacts || 0) + (knew ? 1 : 0),
    };
    setMe(next);
    await sset("users:" + next.id, next);
    refresh(next);
  }, []);

  // auto-dismiss the connection alert after 8 seconds
  useEffect(() => {
    if (!connAlert) return;
    const t = setTimeout(() => setConnAlert(null), 8000);
    return () => clearTimeout(t);
  }, [connAlert]);

  const ping = useCallback((m) => { setToast(m); setTimeout(() => setToast(null), 2200); }, []);

  // boot: check URL for screen/admin mode
  useEffect(() => {
    const q = (typeof window !== "undefined" ? window.location.search : "") || "";
    if (q.includes("screen")) { setView("screen"); return; }
    if (q.includes("admin")) { setView("admin"); return; }
    setView("landing");
  }, []);

  // load my inbox + flash, recompute, persist score cache
  const refresh = useCallback(async (myRec) => {
    const rec = myRec || meRef.current;
    if (!rec) return;
    const evs = await sgetAll("inbox:" + rec.id + ":");
    setInbox(evs);
    // surface newly-arrived inbound connections as a prominent alert
    const keyOf = (e) => `${e.type}:${e.fromId}:${e.ts}`;
    if (seenInbox.current === null) {
      // first load after sign-in: seed without alerting on historical events
      seenInbox.current = new Set(evs.map(keyOf));
    } else {
      const fresh = evs.filter((e) => e.type === "connection" && !seenInbox.current.has(keyOf(e)));
      evs.forEach((e) => seenInbox.current.add(keyOf(e)));
      if (fresh.length) {
        const latest = fresh.slice().sort((a, b) => (b.ts || 0) - (a.ts || 0))[0];
        setConnAlert({ name: latest.fromName || "Someone new", market: latest.fromMarket || "", points: latest.points || 0, ts: latest.ts });
      }
    }
    const fl = await sget("flash:current");
    setFlash(fl && fl.endsAt > Date.now() ? fl : null);
    // fold any inbound connections into my connections (for stamps + dedupe)
    let changed = false;
    const cons = [...(rec.connections || [])];
    for (const e of evs.filter((x) => x.type === "connection")) {
      if (!cons.some((c) => c.id === e.fromId)) { cons.push({ id: e.fromId, name: e.fromName, market: e.fromMarket, team: e.fromTeam || "", in: true }); changed = true; }
    }
    let next = rec;
    if (changed) { next = { ...rec, connections: cons }; }
    // auto-awards: trio + full passport
    next = await applyAutoAwards(next, evs);
    setMe(next);
    if (changed || next !== rec) await sset("users:" + next.id, next);
    const finalTotal = (next.selfPoints || 0) + sum(evs, (e) => e.points);
    await sset("score:" + next.id, { id: next.id, name: next.name, market: next.market, total: finalTotal, table: next.table || "", charity: next.charity || "", newConnections: next.newConnections || 0 });
  }, []);

  useEffect(() => {
    if (view !== "app" || !me) return;
    refresh(me);
    const t = setInterval(() => refresh(), 20000);
    return () => clearInterval(t);
    // eslint-disable-next-line
  }, [view, me && me.id]);

  const total = (me ? me.selfPoints || 0 : 0) + sum(inbox, (e) => e.points);
  const collected = me ? collectedMarkets(me) : [];

  const displayTotal = useCountUp(total);
  const [pointsPop, setPointsPop] = useState(null);
  const [bump, setBump] = useState(false);
  const prevTotalRef = useRef(total);
  useEffect(() => {
    const prev = prevTotalRef.current;
    if (total > prev) {
      setPointsPop(total - prev);
      setBump(true);
      const t1 = setTimeout(() => setPointsPop(null), 1100);
      const t2 = setTimeout(() => setBump(false), 500);
      prevTotalRef.current = total;
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }
    prevTotalRef.current = total;
  }, [total]);

  if (view === "boot") return <Styles />;
  if (view === "screen") {
    const classic = SCREEN_CLASSIC || (typeof window !== "undefined" && /[?&]screen=classic/.test(window.location.search));
    return (<><Styles /><AnnounceBar />{classic ? <BigScreen onExit={() => setView("landing")} /> : <BigScreenLive onExit={() => setView("landing")} />}</>);
  }
  if (view === "admin") return (<><Styles /><Admin onExit={() => setView("landing")} onScreen={() => setView("screen")} /></>);
  if (view === "landing") return (<><Styles /><AnnounceBar /><Landing onAuthed={(rec) => { setMe(rec); setView("app"); refresh(rec); }} onAdmin={() => setView("admin")} onRegister={() => setView("register")} onScreen={() => setView("screen")} /></>);
  if (view === "register") return (<><Styles /><AnnounceBar /><Register onDone={(rec) => { setMe(rec); setView("app"); refresh(rec); }} onBack={() => setView("landing")} /></>);

  // ---- main app ----
  return (
    <div className="gcq">
      <Styles />
      <AnnounceBar />
      <div className="wrap">
        <div style={{ flex: 1, paddingTop: 16, paddingBottom: 12 }}>
          <div className="codebar">
            <div className="ptsbox">
              <span className="codebar-lbl">Points</span>
              <span className={"ptsval" + (bump ? " bump" : "")}>
                {displayTotal}
                {pointsPop != null && <span className="ptspop">+{pointsPop}</span>}
              </span>
            </div>
            <div style={{ textAlign: "right" }}>
              <span className="codebar-lbl">Your Connect Code</span>
              <div className="codebar-val mono">{me.code}</div>
            </div>
          </div>
          {backable && (
            <button className="backbtn" onClick={goBack}>
              <span style={{ fontSize: 16, lineHeight: 1 }}>‹</span> Back
            </button>
          )}
          {flash && <div className="flash" style={{ marginBottom: 14 }}>⚡ {flash.title} — {flash.desc}{flash.mult > 1 ? `  (×${flash.mult} points!)` : ""}</div>}
          <div style={{ overflowX: "clip" }}>
            {tab === "passport" && <Passport me={me} total={total} inbox={inbox} collected={collected} ping={ping} setMe={setMe} refresh={refresh} />}
            {tab === "connect" && <Connect me={me} flash={flash} ping={ping} setMe={setMe} refresh={refresh} collected={collected} askKnew={askKnew} />}
            {tab === "quiz" && <QuizHub me={me} ping={ping} setMe={setMe} refresh={refresh} askKnew={askKnew} />}
            {tab === "learn" && <Learn me={me} ping={ping} setMe={setMe} refresh={refresh} />}
            {tab === "explore" && <Explore />}
            {tab === "missions" && <Missions me={me} total={total} ping={ping} setMe={setMe} refresh={refresh} />}
          </div>
        </div>
        <div className="nav">
          {[["passport", "Passport"], ["connect", "Connect"], ["quiz", "Quiz"], ["learn", "Learn"], ["missions", "Quests"], ["explore", "Explore"]].map(([k, l]) => (
            <button key={k} className={"tab" + (tab === k ? " on" : "")} onClick={() => navTo(k)}>
              <TabIcon name={k} /><span>{l}</span><span className="dot" />

        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
      {knewAsk && (
        <div className="modal" style={{ alignItems: "center" }} onClick={() => setKnewAsk(null)}>
          <div className="sheet" style={{ borderRadius: 18, maxWidth: 360, margin: "0 16px" }} onClick={(e) => e.stopPropagation()}>
            <div className="eyebrow" style={{ color: "var(--navy)" }}>Quick one</div>

            <p className="muted" style={{ fontSize: 13, marginBottom: 14 }}>Just for the stats — it doesn't change your points. We're counting how many brand-new connections the Quest sparks.</p>
            <div style={{ display: "flex", gap: 8 }}>

              <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => answerKnew(false)}>No — brand new!</button>
            </div>

      {connAlert && (
        <div className="conn-alert" onClick={() => setConnAlert(null)}>

            <div className="conn-alert-tap">Tap to dismiss</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================================
   DERIVATIONS
============================================================================ */
function collectedMarkets(me) {
  const s = new Set();
  (me.connections || []).forEach((c) => { if (c.market) s.add(c.market); });
  return [...s];
}
async function applyAutoAwards(rec, evs) {
  let next = rec;
  const cols = collectedMarkets(next);
  // Trio bonus
  if (cols.length >= 3 && !next.trioAwarded) {
    next = { ...next, trioAwarded: true, selfPoints: (next.selfPoints || 0) + PTS.trioBonus, missions: { ...next.missions, m_3market: true } };
  }
  // Full passport
  if (cols.length >= MARKETS.length && !next.fullAwarded) {
    next = { ...next, fullAwarded: true, selfPoints: (next.selfPoints || 0) + PTS.fullPassport };
  }
  // Stamp milestone: +200 at 8 markets, then +200 for each market beyond (runs alongside the above)
  const units = Math.max(0, cols.length - (STAMP_MILESTONE_AT - 1)); // 8 markets -> 1, 9 -> 2, ...
  const paid = next.stampBonusUnits || 0;
  if (units > paid) {
    next = { ...next, stampBonusUnits: units, selfPoints: (next.selfPoints || 0) + PTS.stampMilestone * (units - paid) };
  }
  return next;
}

// Create a connection from `me` to `idx`. Centralises two things:
//  - Q6: if the peer already connected with me (both entered codes at once), the base
//    connect points already arrived via their inbox event, so don't double-count and
//    don't send a duplicate event. Reduces (can't fully eliminate) the exact-simultaneous race.
//  - Q3: the first EARLY_BIRD_COUNT people globally to make a connection get a one-off bonus.
// Persists my record (+ the peer's inbox event when needed) and returns { next, earned, earlyBird }.
async function awardConnection(me, idx, mult) {
  mult = mult || 1;
  const collected = collectedMarkets(me);
  const isNewMarket = !collected.includes(idx.market) && idx.market !== me.market;

  let alreadyInbound = false;
  try {
    const myEvs = await sgetAll("inbox:" + me.id + ":");
    alreadyInbound = myEvs.some((e) => e.type === "connection" && e.fromId === idx.id);
  } catch (e) {}
  const base = alreadyInbound ? 0 : PTS.connect;
  const earned = (base + (isNewMarket ? PTS.newMarket : 0)) * mult;

  let earlyBird = false;
  if (!me.earlyBird) {
    try {
      const claimed = await slist("earlybird:");
      const mine = "earlybird:" + me.id;
      if (!claimed.includes(mine) && claimed.length < EARLY_BIRD_COUNT) { await sset(mine, { ts: Date.now() }); earlyBird = true; }
    } catch (e) {}
  }

  const next = {
    ...me,
    selfPoints: (me.selfPoints || 0) + earned + (earlyBird ? PTS.earlyBird : 0),
    earlyBird: me.earlyBird || earlyBird,
    connections: [...(me.connections || []), { id: idx.id, name: idx.name, market: idx.market, team: idx.team || "" }],
    missions: { ...me.missions, m_code: true, m_coffee: me.missions.m_coffee || isNewMarket },
  };
  await sset("users:" + me.id, next);
  if (!alreadyInbound) {
    const ev = { id: eid(), type: "connection", points: PTS.connect * mult, fromId: me.id, fromName: me.name, fromMarket: me.market, fromTeam: me.team || "", ts: Date.now() };
    await sset("inbox:" + idx.id + ":" + ev.id, ev);
  }
  return { next, earned, earlyBird };
}

// Honour-system points for engaging with the Learn sections (capped, one tap each).
async function logHonour(me, key, cap, pts, setMe, refresh, ping, label) {
  const used = me[key] || 0;
  if (used >= cap) { ping("You've already banked the max for " + label); return; }
  const next = { ...me, [key]: used + 1, selfPoints: (me.selfPoints || 0) + pts };
  setMe(next); await sset("users:" + me.id, next); refresh(next);
  const left = cap - used - 1;
  ping(`+${pts}${left > 0 ? ` — ${left} more to bank` : " — that's the lot!"}`);
}

/* ---- Passport stamp visuals ---------------------------------------------- */
function octagon(cx, cy, r) {
  const p = [];
  for (let k = 0; k < 8; k++) { const a = Math.PI / 8 + k * Math.PI / 4; p.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`); }
  return p.join(" ");
}
function StampSVG({ market, idx, color }) {
  const code = codeFor(market);
  const shape = idx % 4;
  const glyph = GLYPHS[idx % GLYPHS.length];
  const ring = (sw, scale) => {
    const r1 = 44 * scale, r2 = 36 * scale;
    if (shape === 0) return (<><circle cx="50" cy="50" r={r1} fill="none" stroke={color} strokeWidth={sw} /><circle cx="50" cy="50" r={r2} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
    if (shape === 1) { const a = 50 - r1, b = 2 * r1, c = 50 - r2, d = 2 * r2; return (<><rect x={a} y={a} width={b} height={b} rx="14" fill="none" stroke={color} strokeWidth={sw} /><rect x={c} y={c} width={d} height={d} rx="10" fill="none" stroke={color} strokeWidth={sw * 0.7} /></>); }
    if (shape === 2) return (<><ellipse cx="50" cy="50" rx={r1} ry={r1 * 0.8} fill="none" stroke={color} strokeWidth={sw} /><ellipse cx="50" cy="50" rx={r2} ry={r2 * 0.8} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
    return (<><polygon points={octagon(50, 50, r1)} fill="none" stroke={color} strokeWidth={sw} /><polygon points={octagon(50, 50, r2)} fill="none" stroke={color} strokeWidth={sw * 0.7} /></>);
  };
  return (
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g style={{ opacity: 0.92 }}>
        {ring(2.6, 1)}
        <text x="50" y="30" textAnchor="middle" fontSize="11" fill={color}>{glyph}</text>
        <text x="50" y="60" textAnchor="middle" fontSize="23" fontWeight="700" fill={color} fontFamily="'Space Mono',monospace" letterSpacing="1">{code}</text>
        <text x="50" y="76" textAnchor="middle" fontSize="8" fill={color} fontFamily="'Space Mono',monospace" letterSpacing="1.5">TOKYO &#8217;26</text>
      </g>
    </svg>
  );
}
function LockedSVG({ market }) {
  const code = codeFor(market);
  return (
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--line)" strokeWidth="2" strokeDasharray="3 5" />
      <text x="50" y="58" textAnchor="middle" fontSize="20" fontWeight="700" fill="#c9bd9f" fontFamily="'Space Mono',monospace" letterSpacing="1">{code}</text>
    </svg>
  );
}
function Stamp({ market, idx, on }) {
  const rot = ((idx * 37) % 19) - 9; // deterministic tilt -9..+9
  const color = INK[idx % INK.length];
  return (
    <div className={"stmpwrap" + (on ? " got" : "")}>
      <div className={"stmp" + (on ? " on" : " locked")}>
        {on
          ? <div className="inkrot" style={{ transform: `rotate(${rot}deg)` }}><div className="ink"><StampSVG market={market} idx={idx} color={color} /></div></div>
          : <div className="inkrot"><div style={{ width: "82%", height: "82%", opacity: 0.6 }}><LockedSVG market={market} /></div></div>}
      </div>
      <span className="stmp-name">{market}</span>
    </div>
  );
}
function ProgressRing({ pct }) {
  const r = 26, c = 2 * Math.PI * r;
  return (
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r={r} fill="none" stroke="var(--paper2)" strokeWidth="7" />
      <circle cx="32" cy="32" r={r} fill="none" stroke="var(--green)" strokeWidth="7" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - pct / 100)} transform="rotate(-90 32 32)"
        style={{ transition: "stroke-dashoffset .7s ease" }} />
      <text x="32" y="37" textAnchor="middle" fontSize="16" fontWeight="800" fill="var(--navy)">{Math.round(pct)}%</text>
    </svg>
  );
}
function travelLabel(n) {
  if (n === 0) return "Passport unstamped";
  if (n <= 3) return "Just landed";
  if (n <= 7) return "Frequent flyer";
  if (n <= 11) return "Seasoned traveller";
  if (n < 16) return "Globetrotter";
  return "Around the world!";
}

/* ============================================================================
   CONNECT — enter a peer's code (4-digit). Both sides score, once per person.
============================================================================ */
function Connect({ me, flash, ping, setMe, refresh, collected, askKnew }) {
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [match, setMatch] = useState(null);

  async function connect() {
    const c = code.trim();
    if (!/^\d{3}$/.test(c)) { ping("Enter a 3-digit code"); return; }
    if (c === me.code) { ping("That's your own code!"); return; }
    setBusy(true);
    const idx = await sget("code:" + c);
    if (!idx) { setBusy(false); ping("Code not found"); return; }
    if ((me.connections || []).some((x) => x.id === idx.id)) { setBusy(false); ping("Already connected with " + idx.name); setCode(""); return; }

    const mult = flash && flash.mult > 1 ? flash.mult : 1;
    const { next, earned, earlyBird } = await awardConnection(me, idx, mult);
    setMe(next);
    setBusy(false); setCode("");
    let msg = earned > 0 ? `+${earned} — connected with ${idx.name}!` : `Connected with ${idx.name}!`;
    if (earlyBird) msg += ` · +${PTS.earlyBird} early bird!`;
    ping(msg);
    refresh(next);
    if (askKnew) askKnew(idx.name);
  }

  async function findMatch() {
    const all = await sgetAll("users:");
    const pool = all.filter((u) => u && u.id !== me.id && !(me.connections || []).some((c) => c.id === u.id));
    if (!pool.length) { ping("No new people to match yet"); return; }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    setMatch(pick);
  }

  return (
    <div>
      <div className="eyebrow">Connect</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Meet someone new</h2>

      <div className="card">
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Enter a peer's Connect Code</div>
        <input className="input mono" style={{ marginTop: 8, fontSize: 22, letterSpacing: ".3em", textAlign: "center" }}
          value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 3))}
          placeholder="000" inputMode="numeric" />
        <button className="btn btn-primary" style={{ marginTop: 10 }} onClick={connect} disabled={busy}>
          {busy ? "Connecting…" : "Connect & score"}
        </button>
        <div className="instr" style={{ marginTop: 10 }}>
          +{PTS.connect} each. +{PTS.newMarket} extra if they're a new market{flash && flash.mult > 1 ? `. ×${flash.mult} flash bonus live!` : ""}
        </div>
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Random match</div>
        <div className="instr" style={{ margin: "6px 0 10px" }}>Get paired with a colleague you haven't met, then go find them.</div>
        <button className="btn btn-ghost" onClick={findMatch}>Find me a match</button>
        {match && (
          <div style={{ marginTop: 12, borderTop: "1px solid var(--line)", paddingTop: 12 }}>
            <p style={{ fontWeight: 800, fontSize: 17 }}>{match.name}</p>
            <p className="muted" style={{ fontSize: 13 }}>{match.market}{match.team ? ` · ${match.team}` : ""}{match.nationality ? ` · ${match.nationality}` : ""}{match.table ? ` · Table ${match.table}` : ""}</p>
            {match.hobbies && <p style={{ fontSize: 13, marginTop: 6 }}>Ask them about: <b>{match.hobbies.filter(Boolean)[0]}</b></p>}
            <p className="muted" style={{ fontSize: 12, marginTop: 6 }}>Find them, swap codes, and connect above.</p>
          </div>
        )}
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>People you've met ({(me.connections || []).length})</div>
        {(me.connections || []).length === 0
          ? <p className="muted" style={{ fontSize: 13, marginTop: 6 }}>No connections yet — go say hello.</p>
          : <div style={{ marginTop: 8 }}>{(me.connections || []).map((c, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: "1px solid var(--line)", fontSize: 14 }}>
                <span style={{ minWidth: 0 }}><span style={{ fontWeight: 600 }}>{c.name}</span>{c.team ? <span className="muted" style={{ fontSize: 12 }}> · {c.team}</span> : ""}</span>
                <span className="pill" style={{ flexShrink: 0 }}>{c.market}</span>
              </div>))}</div>}
      </div>
    </div>
  );
}

/* ============================================================================
   PEER POP QUIZ ("About me") — host builds a quiz, peer answers, 60s timer
============================================================================ */
function Trivia({ me, ping, setMe, refresh, askKnew }) {
  const [stage, setStage] = useState("intro"); // intro | run | done
  const [peer, setPeer] = useState(null);
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [picked, setPicked] = useState(null);
  const [time, setTime] = useState(60);
  const tref = useRef(null);
  const correctRef = useRef(0);

  function buildQuestions(p) {
    const hobbyPool = ["Skiing", "Cycling", "Painting", "Gardening", "Chess", "Running", "Baking", "Photography", "Yoga", "Surfing"];
    const realHobby = (p.hobbies || []).filter(Boolean)[0] || "Reading";
    const hobbyOpts = shuffle([realHobby, ...pickN(hobbyPool.filter((h) => h !== realHobby), 2)]);
    const placeOpts = shuffle([p.exotic || "Iceland", ...pickN(PLACE_POOL.filter((x) => x !== p.exotic), 2)]);
    const marketOpts = shuffle([p.market, ...pickN(MARKETS.filter((m) => m !== p.market), 2)]);
    return [
      { q: `Which hobby belongs to ${p.name}?`, options: hobbyOpts, a: hobbyOpts.indexOf(realHobby) },
      { q: `Where is the most exotic place ${p.name} has visited?`, options: placeOpts, a: placeOpts.indexOf(p.exotic || "Iceland") },
      { q: `Which is ${p.name}'s home market?`, options: marketOpts, a: marketOpts.indexOf(p.market) },
    ];
  }

  async function startQuiz() {
    const c = code.trim();
    if (!/^\d{3}$/.test(c) || c === me.code) { ping("Enter a valid peer code"); return; }
    setBusy(true);
    const idx = await sget("code:" + c);
    if (!idx) { setBusy(false); ping("Code not found"); return; }
    if ((me.triviaWith || []).includes(idx.id)) { setBusy(false); ping("Already quizzed on " + idx.name); return; }
    const full = (await sget("users:" + idx.id)) || idx;
    // entering a code here also connects you, exactly like Connect & score
    if (!(me.connections || []).some((x) => x.id === idx.id)) {
      const { next, earned, earlyBird } = await awardConnection(me, idx, 1);
      setMe(next);
      let msg = earned > 0 ? `+${earned} — connected with ${idx.name}!` : `Connected with ${idx.name}!`;
      if (earlyBird) msg += ` · +${PTS.earlyBird} early bird!`;
      ping(msg);
      refresh(next);
      if (askKnew) askKnew(idx.name);
    }
    setBusy(false);
    setPeer(full); setQs(buildQuestions(full)); setStage("run"); setQi(0); setCorrect(0); correctRef.current = 0; setTime(60);
  }

  useEffect(() => {
    if (stage !== "run") return;
    tref.current = setInterval(() => setTime((t) => { if (t <= 1) { clearInterval(tref.current); finish(correctRef.current); return 0; } return t - 1; }), 1000);
    return () => clearInterval(tref.current);
    // eslint-disable-next-line
  }, [stage]);

  function answer(i) {
    if (picked !== null) return;
    setPicked(i);
    const ok = i === qs[qi].a;
    const nc = correct + (ok ? 1 : 0);
    if (ok) setCorrect(nc);
    correctRef.current = nc;
    setTimeout(() => {
      setPicked(null);
      if (qi + 1 < qs.length) setQi(qi + 1);
      else { clearInterval(tref.current); finish(nc); }
    }, 900);
  }

  async function finish(nc) {
    setStage("done");
    if (nc >= 1) fireConfetti();
    const youPts = nc * PTS.triviaCorrect;
    const next = { ...me, selfPoints: (me.selfPoints || 0) + youPts, triviaWith: [...(me.triviaWith || []), peer.id], missions: { ...me.missions, m_trivia: true } };
    setMe(next); await sset("users:" + me.id, next);
    const ev = { id: eid(), type: "trivia", points: PTS.triviaSubject, fromId: me.id, fromName: me.name, fromMarket: me.market, ts: Date.now() };
    await sset("inbox:" + peer.id + ":" + ev.id, ev);
    refresh(next);
  }

  if (stage === "intro") return (
    <div>
      <div className="eyebrow">Peer Pop Quiz</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>How well do you know them?</h2>
      <div className="card">
        <div className="instr">Enter a colleague's Connect Code and we'll generate a 60-second, 3-question quiz <b>about them</b>. Answer against the clock, you'll only know the answers if you've really talked.</div>
        <div style={{ background: "var(--paper2)", borderRadius: 10, padding: 12, margin: "12px 0", fontSize: 13 }}>
          <b>Scoring</b><br />+{PTS.triviaCorrect} to you per correct answer<br />+{PTS.triviaSubject} to them for the connection
        </div>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Their Connect Code</div>
        <input className="input mono" style={{ marginTop: 8, fontSize: 22, letterSpacing: ".3em", textAlign: "center" }}
          value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 3))} placeholder="000" inputMode="numeric" />
        <button className="btn btn-primary" style={{ marginTop: 10 }} disabled={busy} onClick={startQuiz}>{busy ? "Building quiz…" : "Start the quiz"}</button>
      </div>
    </div>
  );

  if (stage === "run") {
    const q = qs[qi];
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span className="pill">Question {qi + 1}/3</span>
          <span className="timer" style={{ color: time <= 10 ? "var(--seal)" : "#fff", fontSize: 30 }}>{time}s</span>
        </div>
        <div className="card">
          <p style={{ fontWeight: 800, fontSize: 18, marginBottom: 14 }}>{q.q}</p>
          {q.options.map((o, i) => (
            <button key={i} className={"opt" + (picked !== null && i === q.a ? " correct" : picked === i && i !== q.a ? " wrong" : "")}
              onClick={() => answer(i)}>{o}</button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="eyebrow">Peer Pop Quiz</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 12 }}>Time!</h2>
      <div className="card" style={{ textAlign: "center" }}>
        <div style={{ fontSize: 48 }}>{correct === 3 ? "🏆" : correct >= 1 ? "✨" : "🤝"}</div>
        <p style={{ fontWeight: 800, fontSize: 20, margin: "8px 0" }}>You scored {correct}/3 on {peer && peer.name}</p>
        <p className="muted" style={{ fontSize: 14 }}>You earned +{correct * PTS.triviaCorrect}. {peer && peer.name} earned +{PTS.triviaSubject} for the connection.</p>
        <button className="btn btn-primary" style={{ marginTop: 14 }} onClick={() => { setStage("intro"); setCode(""); setPeer(null); }}>Quiz someone else</button>
      </div>
    </div>
  );
}
function shuffle(a) { const x = [...a]; for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[x[i], x[j]] = [x[j], x[i]]; } return x; }
function fireConfetti() {
  if (typeof document === "undefined") return;
  const colors = ["#0073b9", "#4ea3d6", "#00314a", "#d2304a", "#c7d4dd", "#ffffff"];
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden";
  for (let i = 0; i < 90; i++) {
    const p = document.createElement("div");
    const w = 6 + Math.random() * 6;
    const dx = (Math.random() * 2 - 1) * 120;
    const rot = (360 + Math.random() * 720) * (Math.random() < 0.5 ? 1 : -1);
    p.style.cssText = `position:absolute;top:-12px;left:${Math.random() * 100}%;width:${w}px;height:${w * 0.45}px;background:${colors[i % colors.length]};border-radius:1px;opacity:0;--dx:${dx}px;--rot:${rot}deg;animation:gcq-confetti ${1.9 + Math.random() * 1.5}s cubic-bezier(.15,.6,.35,1) ${Math.random() * 0.35}s forwards`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3800);
}
function pickN(a, n) { return shuffle(a).slice(0, n); }

// Shared quiz runner with explanation reveal + Next
function QuizRunner({ questions, onFinish }) {
  const [qi, setQi] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correct, setCorrect] = useState(0);
  const q = questions[qi];
  function pick(i) {
    if (picked !== null) return;
    setPicked(i);
    if (i === q.a) setCorrect((c) => c + 1);
  }
  function next() {
    const last = qi + 1 >= questions.length;
    const finalCorrect = correct;
    if (last) { onFinish(finalCorrect); return; }
    setQi(qi + 1); setPicked(null);
  }
  return (
    <div>
      <div className="eyebrow" style={{ color: "var(--navy)" }}>Question {qi + 1} / {questions.length}</div>
      <p style={{ fontWeight: 800, fontSize: 16, margin: "8px 0 12px", lineHeight: 1.35 }}>{q.q}</p>
      {q.options.map((o, i) => (
        <button key={i} disabled={picked !== null}
          className={"opt" + (picked !== null && i === q.a ? " correct" : picked === i && i !== q.a ? " wrong" : "")}
          onClick={() => pick(i)}>{o}</button>
      ))}
      {picked !== null && (
        <div style={{ marginTop: 10 }}>
          <div style={{ background: "var(--paper2)", borderRadius: 10, padding: "10px 12px", fontSize: 13, lineHeight: 1.4 }}>
            <b style={{ color: picked === q.a ? "var(--green)" : "var(--seal)" }}>{picked === q.a ? "Correct" : "Not quite"} — </b>{q.explain}
          </div>
          <button className="btn btn-primary" style={{ marginTop: 10 }} onClick={next}>{qi + 1 >= questions.length ? "Finish" : "Next question"}</button>
        </div>
      )}
    </div>
  );
}

    setBonusBusy(true);
    const b = await sget("bonus:" + c);
    if (!b) { setBonusBusy(false); ping("Code not recognised"); return; }
    const redeemed = me.bonusRedeemed || {};
    if (redeemed[c]) { setBonusBusy(false); ping("You've already used that code"); return; }
    if (b.maxUses && b.maxUses > 0) {
      const used = await slist("bonusUse:" + c + ":");
      if (used.length >= b.maxUses) { setBonusBusy(false); ping("This code has been fully claimed"); return; }
    }
    await sset("bonusUse:" + c + ":" + me.id, { ts: Date.now() });
    const next = { ...me, selfPoints: (me.selfPoints || 0) + b.points, bonusRedeemed: { ...redeemed, [c]: true } };
    setMe(next); await sset("users:" + me.id, next);
    setBonusBusy(false); setBonusCode("");
    ping(`+${b.points}${b.label ? " — " + b.label : ""}!`);
    refresh(next);
  }
  return (
    <div>
      <div className="eyebrow">Quests</div>
      <h2 className="h1" style={{ color: "#fff", marginBottom: 4 }}>Your challenges</h2>
      <p style={{ color: "#9fb4bd", fontSize: 13, marginBottom: 12 }}>{doneCount}/{MISSIONS.length} complete</p>
      <div className="card">
        <div className="progress" style={{ marginBottom: 14 }}><span style={{ width: Math.round((doneCount / MISSIONS.length) * 100) + "%" }} /></div>
        {MISSIONS.map((m) => {
          const on = me.missions && me.missions[m.id];
          return (
            <div key={m.id} onClick={() => toggle(m)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 0", borderBottom: "1px solid var(--line)", cursor: on ? "default" : "pointer" }}>
              <div style={{ width: 24, height: 24, borderRadius: 7, border: "2px solid " + (on ? "var(--green)" : "var(--line)"), background: on ? "var(--green)" : "#fff", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 900, transition: "all .25s", flexShrink: 0 }}>{on ? "✓" : ""}</div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 14, fontWeight: 600, textDecoration: on ? "line-through" : "none", opacity: on ? .6 : 1 }}>{m.label}</p>
              </div>
              <span className="pill">+{m.pts}</span>
            </div>
          );
        })}
      </div>
      <p className="muted" style={{ fontSize: 12, marginTop: 10, color: "#9fb4bd" }}>Tip: quests marked auto complete themselves when you act in the app (connecting, quizzing, learning).</p>

      <div className="card" style={{ marginTop: 14 }}>
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Offline points</div>
        <div className="instr" style={{ margin: "8px 0 10px" }}>Got a code from the Gamesmaster for an off-app challenge or win? Enter it here to claim the points.</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input className="input mono" style={{ textTransform: "uppercase", letterSpacing: ".12em" }} value={bonusCode}
            onChange={(e) => setBonusCode(e.target.value.toUpperCase().replace(/\s+/g, ""))} placeholder="ENTER CODE" />
          <button className="btn btn-primary" style={{ width: "auto", padding: "12px 16px" }} disabled={bonusBusy} onClick={redeem}>{bonusBusy ? "…" : "Claim"}</button>
        </div>
      </div>
    </div>
  );
}

function RoomNetwork({ players, pairs }) {
  const cvRef = useRef(null);
  const nodesRef = useRef({});       // id -> node layout/state
  const orderRef = useRef([]);       // stable id order
  const edgesRef = useRef([]);       // { a, b, born }
  const seenRef = useRef(new Set());  // pair keys already drawn
  const primedRef = useRef(false);   // first ingest: don't animate the whole backlog
  const [hud, setHud] = useState({ conn: 0, bridges: 0, markets: 0, lit: 0, total: 0, full: false });

  useEffect(() => {
    const now = (typeof performance !== "undefined" ? performance.now() : Date.now());
    const nodes = nodesRef.current;
    const primed = primedRef.current;
    const litStamp = primed ? now : now - 2000;   // skip the mass pop on first load
    const edgeBorn = primed ? now : now - 4000;     // backlog edges render as settled lines
    (players || []).forEach((p) => {
      if (!p || !p.id) return;
      if (!nodes[p.id]) {
        const mi = Math.max(0, MARKETS.indexOf(p.market));
        const col = mi % 4, row = Math.floor(mi / 4);
        const cx = 0.12 + col * 0.252, cy = 0.26 + row * 0.18;
        const nx = Math.min(0.95, Math.max(0.05, cx + (Math.random() + Math.random() - 1) * 0.07));
        const ny = Math.min(0.84, Math.max(0.22, cy + (Math.random() + Math.random() - 1) * 0.06));
        nodes[p.id] = { nx, ny, c: roomColor(p.market), mi, name: ((p.name || "").split(" ")[0]) || "Guest", lit: false, litAt: 0, ph: Math.random() * 6.28, r: 2.8 + Math.random() * 1.4 };
        orderRef.current.push(p.id);
      }
      if ((p.total || 0) > 0 && !nodes[p.id].lit) { nodes[p.id].lit = true; nodes[p.id].litAt = litStamp; }
    });
    (pairs || []).forEach(([a, b]) => {
      if (!a || !b || a === b) return;
      if (nodes[a] && !nodes[a].lit) { nodes[a].lit = true; nodes[a].litAt = litStamp; }
      if (nodes[b] && !nodes[b].lit) { nodes[b].lit = true; nodes[b].litAt = litStamp; }
      const key = a < b ? a + "|" + b : b + "|" + a;
      if (!seenRef.current.has(key)) {
        seenRef.current.add(key);
        edgesRef.current.push({ a, b, born: edgeBorn });
        if (edgesRef.current.length > 160) edgesRef.current.shift();
      }
    });
    primedRef.current = true;
    const litIds = orderRef.current.filter((id) => nodes[id] && nodes[id].lit);
    const mkts = new Set(litIds.map((id) => nodes[id].mi));
    const bridges = new Set();
    seenRef.current.forEach((k) => { const [x, y] = k.split("|"); if (nodes[x] && nodes[y] && nodes[x].mi !== nodes[y].mi) bridges.add(Math.min(nodes[x].mi, nodes[y].mi) + "-" + Math.max(nodes[x].mi, nodes[y].mi)); });
    const total = orderRef.current.length;
    setHud({ conn: seenRef.current.size, bridges: bridges.size, markets: mkts.size, lit: litIds.length, total, full: total > 0 && litIds.length >= total });
  }, [players, pairs]);

  useEffect(() => {
    const cv = cvRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    let W = 0, Hh = 0, DPR = 1, raf, started = 0;
    const resize = () => { const r = cv.getBoundingClientRect(); DPR = Math.min(2, window.devicePixelRatio || 1); W = r.width; Hh = r.height; cv.width = Math.max(1, W * DPR); cv.height = Math.max(1, Hh * DPR); ctx.setTransform(DPR, 0, 0, DPR, 0, 0); };
    resize();
    let ro; if (window.ResizeObserver) { ro = new ResizeObserver(resize); ro.observe(cv); } else window.addEventListener("resize", resize);
    const mx = 0.045;
    const px = (n, t) => (mx + n.nx * (1 - 2 * mx)) * W + Math.sin(t / 2600 + n.ph) * W * 0.006;
    const py = (n, t) => (n.ny) * Hh + Math.cos(t / 2400 + n.ph) * Hh * 0.006;
    const frame = (now) => {
      if (!started) started = now; const t = now - started;
      ctx.clearRect(0, 0, W, Hh);
      const nodes = nodesRef.current, ids = orderRef.current, pos = {};
      ids.forEach((id) => { const n = nodes[id]; pos[id] = [px(n, t), py(n, t)]; });
      ctx.lineCap = "round";
      const edges = edgesRef.current;
      for (let e = 0; e < edges.length; e++) {
        const ed = edges[e], A = pos[ed.a], B = pos[ed.b]; if (!A || !B) continue;
        const age = now - ed.born, baseA = Math.max(0.06, 0.27 - age / 9000);
        ctx.strokeStyle = "rgba(150,205,255," + (age < 900 ? Math.min(0.55, baseA + 0.4) : baseA) + ")";
        ctx.lineWidth = age < 900 ? 1.6 : 1; ctx.beginPath(); ctx.moveTo(A[0], A[1]); ctx.lineTo(B[0], B[1]); ctx.stroke();
        if (age < 1100) { const tt = Math.min(1, age / 1100), dx = A[0] + (B[0] - A[0]) * tt, dy = A[1] + (B[1] - A[1]) * tt; const c = nodes[ed.a] ? nodes[ed.a].c : "#5fb0d8"; ctx.save(); ctx.shadowColor = c; ctx.shadowBlur = 14; ctx.fillStyle = c; ctx.beginPath(); ctx.arc(dx, dy, 3.1, 0, 6.2832); ctx.fill(); ctx.restore(); }
      }
      for (let i = 0; i < ids.length; i++) {
        const n = nodes[ids[i]], P = pos[ids[i]]; if (!P) continue;
        if (!n.lit) { ctx.fillStyle = "rgba(180,200,215,0.22)"; ctx.beginPath(); ctx.arc(P[0], P[1], 2.2, 0, 6.2832); ctx.fill(); continue; }
        const pop = Math.min(1, (now - n.litAt) / 460), rr = n.r * (1 + (1 - pop) * 1.4);
        ctx.globalAlpha = 0.16; ctx.fillStyle = n.c; ctx.beginPath(); ctx.arc(P[0], P[1], rr + 4, 0, 6.2832); ctx.fill();
        ctx.globalAlpha = 0.95; ctx.beginPath(); ctx.arc(P[0], P[1], rr, 0, 6.2832); ctx.fill(); ctx.globalAlpha = 1;
        if (pop < 1) { ctx.globalAlpha = 0.5 * (1 - pop); ctx.strokeStyle = n.c; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(P[0], P[1], rr + 6, 0, 6.2832); ctx.stroke(); ctx.globalAlpha = 1; }
      }
      ctx.font = "12px 'Space Mono', monospace"; ctx.textAlign = "center";
      for (let e = edges.length - 1; e >= 0; e--) {
        const ed = edges[e], life = now - ed.born; if (life > 1800) continue;
        const A = pos[ed.a], B = pos[ed.b]; if (!A || !B) continue;
        const a = 1 - life / 1800, my = (A[1] + B[1]) / 2 - 12 - life / 1800 * 14, mxp = (A[0] + B[0]) / 2;
        ctx.save(); ctx.shadowColor = "rgba(0,0,0,0.65)"; ctx.shadowBlur = 5; ctx.fillStyle = "rgba(255,255,255," + (a * 0.95).toFixed(2) + ")";
        ctx.fillText((nodes[ed.a] ? nodes[ed.a].name : "") + "  \u00d7  " + (nodes[ed.b] ? nodes[ed.b].name : ""), mxp, my); ctx.restore();
      }
      raf = requestAnimationFrame(frame);
    };
    raf = requestAnimationFrame(frame);
    return () => { cancelAnimationFrame(raf); if (ro) ro.disconnect(); else window.removeEventListener("resize", resize); };
  }, []);

  const pct = hud.total ? Math.round(hud.lit / hud.total * 100) : 0;
  return (
    <div className="lt-card">
      <div className="lt-h2">The room · live network</div>
      <div className="rn-stage" style={{ position: "relative", width: "100%", aspectRatio: "16 / 6", minHeight: 220, borderRadius: 14, overflow: "hidden", background: "#0a2c42" }}>
        <canvas ref={cvRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} />
        <div className="rn-cap" style={{ position: "absolute", left: 16, top: 14, pointerEvents: "none" }}>
          <div style={{ fontSize: 13, color: "#9fb4bd" }}>Each dot is a guest. Each line is a connection.</div>
        </div>
        <div className="rn-stats" style={{ position: "absolute", right: 14, top: 12, display: "flex", gap: 9 }}>
          {[["Connections", hud.conn], ["Bridges", hud.bridges], ["Markets", hud.markets + "/" + MARKETS.length]].map(([l, v]) => (
            <div key={l} className="rn-tile" style={{ background: "rgba(255,255,255,.06)", border: "1px solid rgba(255,255,255,.12)", borderRadius: 11, padding: "8px 12px", minWidth: 70, textAlign: "center" }}>
              <div className="rn-v" style={{ fontFamily: "'Space Mono',monospace", fontWeight: 700, fontSize: 20, color: "#fff", lineHeight: 1.05 }}>{v}</div>
              <div className="rn-l" style={{ fontSize: 9.5, letterSpacing: ".1em", textTransform: "uppercase", color: "#9fb4bd" }}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{ position: "absolute", left: 16, right: 16, bottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 12, color: "#cfe0e6", marginBottom: 7 }}>
            <span>Light up the room</span>
            <span style={{ color: hud.full ? "#ffd98a" : "#9fb4bd", fontWeight: hud.full ? 700 : 400 }}>{hud.full ? "Room lit ✨" : `${hud.lit} of ${hud.total} guests in play`}</span>
          </div>
          <div style={{ height: 10, background: "rgba(255,255,255,.09)", borderRadius: 6, overflow: "hidden" }}>
            <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,#2f8fd0,#37c08a)", borderRadius: 6, transition: "width .6s ease" }} />
          </div>
        </div>
      </div>
    </div>
  );
}

function BigScreenLive({ onExit }) {

  const [newConnTotal, setNewConnTotal] = useState(0);

  useEffect(() => {
    let alive = true, busy = false;
    async function load() {
      if (busy) return; busy = true;
      try {
      const players = await sgetAll("score:");
      const sorted = [...players].sort((a, b) => (b.total || 0) - (a.total || 0));
      const idMap = {};
      players.forEach((p) => { if (p && p.id) idMap[p.id] = p; });
      const agg = {};
      players.forEach((s) => { if (!s || !s.market) return; if (!agg[s.market]) agg[s.market] = { market: s.market, total: 0, count: 0 }; agg[s.market].total += (s.total || 0); agg[s.market].count++; });
      const ms = Object.values(agg).map((v) => ({ ...v, avg: Math.round(v.total / v.count) })).sort((a, b) => b.avg - a.avg).slice(0, 8);

      const tagg = {};
      players.forEach((s) => { if (!s || !s.table) return; if (!tagg[s.table]) tagg[s.table] = { table: s.table, total: 0, count: 0 }; tagg[s.table].total += (s.total || 0); tagg[s.table].count++; });
      const ts8 = Object.values(tagg).sort((a, b) => b.total - a.total).slice(0, 8);

      const evRows = await sgetAllKV("inbox:");
      const pairs = [];
      evRows.forEach(({ key, value }) => {
        if (value && value.type === "connection") { const rid = (key.split(":")[1]) || ""; if (rid && value.fromId) pairs.push([value.fromId, rid]); }
      });
      const events = evRows.map(({ key, value }) => {
        const recId = (key.split(":")[1]) || "";
        const rec = idMap[recId] || {};
        return { ts: value.ts || 0, type: value.type || "event", points: value.points || 0, fromName: value.fromName || "", fromMarket: value.fromMarket || "", toName: rec.name || "", toMarket: rec.market || "" };
      }).filter((e) => e.fromName || e.toName).sort((a, b) => b.ts - a.ts);

      const since = Date.now() - 10 * 60000;
      const recent = events.filter((e) => e.ts >= since);
      const connections = recent.filter((e) => e.type === "connection").length;
      const quizzes = recent.filter((e) => e.type === "trivia").length;
      const points = recent.reduce((s, e) => s + (e.points || 0), 0);
      const active = new Set(recent.map((e) => e.toName).filter(Boolean)).size;

      if (!alive) return;
      setRows(sorted.slice(0, 10)); setCount(players.length);
      setMarkets(ms); setTables(ts8); setFeed(events.slice(0, 250));
      setStats({ connections, quizzes, points, active });
      setNewConnTotal(players.reduce((s, p) => s + ((p && p.newConnections) || 0), 0));
      setNetPlayers(players); setNetPairs(pairs);
      } catch (e) {} finally { busy = false; }
    }
    load(); const t = setInterval(load, 6000); return () => { alive = false; clearInterval(t); };
  }, []);

  const PROMPTS = ["Meet someone new to score +20", "A new market stamp is worth +30", "Collect every market for a +300 bonus", "Run a quiz with a new contact", "Three markets unlocks a +150 bonus", "Find someone from a market you haven't met"];
  const tickerItems = [];

    PROMPTS.forEach((p) => tickerItems.push({ type: "welcome", fromName: p, points: 0 }));
  } else {
    feed.forEach((e, idx) => {
      tickerItems.push(e);
      if ((idx + 1) % 5 === 0) tickerItems.push({ type: "welcome", fromName: PROMPTS[Math.floor(idx / 5) % PROMPTS.length], points: 0 });
    });
  }
  const dur = Math.max(40, tickerItems.length * 5);

  function lineFor(e, i) {
    const dotColor = e.type === "connection" ? "var(--green)" : e.type === "trivia" ? "#5fb0d8" : e.type === "boost" ? "var(--gold)" : e.type === "welcome" ? "#9fb4bd" : "#37c08a";

    else if (e.type === "boost") body = (<><span className="lt-who">{e.fromName || "Gamesmaster"}</span><span className="lt-met">awarded</span><span className="lt-who">{e.toName || "a player"}</span></>);
    else if (e.type === "welcome") body = (<span style={{ color: "#cfe0e6" }}>{e.fromName}</span>);
    else body = (<><span className="lt-who">{e.toName || e.fromName || "Someone"}</span><span style={{ color: "#9fb4bd" }}>earned points</span></>);
    return (<span className={"lt-item" + (e.type === "boost" ? " gold" : "")} key={i}><span className="lt-dot" style={{ background: dotColor }} />{body}{e.points > 0 && <span className="lt-pts">+{e.points}</span>}</span>);
  }

  const maxMarket = Math.max(1, ...markets.map((m) => m.avg));

  return (

      <div className="lt-head">
        <div className="eyebrow" style={{ color: "var(--gold)" }}>Asia Pacific Business Forum 2026</div>
        <h1 style={{ fontSize: 40, fontWeight: 900, margin: "6px 0 2px" }}>Connection Quest</h1>
        <p style={{ color: "#9fb4bd", fontSize: 17 }}>Live leaderboard · {count} explorers in play{newConnTotal > 0 ? ` · ${newConnTotal.toLocaleString()} new connections sparked` : ""}</p>

      <div className="lt-ticker">

      <div className="lt-grid">

              <span className="lt-rank">{i + 1}</span>

              <span className="lt-total">{r.total}</span>

          ))}
        </div>

        <div className="lt-right">
          <div className="lt-card">
            <div className="lt-h2">Market race · avg points per person</div>
            <div className="lt-race">
              {markets.map((m) => (
                <div className="lt-rrow" key={m.market}>
                  <span className="lt-rlabel">{m.market}</span>
                  <div className="lt-rtrack"><div className="lt-rfill" style={{ width: (m.avg / maxMarket * 100).toFixed(1) + "%" }} /></div>
                  <span className="lt-rval">{(m.avg || 0).toLocaleString()}</span>

  return (
    <div className="scrn">
      {onExit && <span className="link" onClick={onExit} style={{ position: "fixed", top: 14, right: 18, color: "#6f8893", fontSize: 13 }}>Exit</span>}
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <div className="eyebrow" style={{ color: "var(--gold)" }}>Asia Pacific Business Forum 2026</div>
        <h1 style={{ fontSize: 44, fontWeight: 900, margin: "6px 0 2px" }}>Connection Quest</h1>
        <p style={{ color: "#9fb4bd", fontSize: 18, marginBottom: 24 }}>Live leaderboard · {count} explorers in play</p>
        {marketStandings.length > 0 && (
          <div style={{ background: "rgba(78,163,214,.14)", border: "1px solid rgba(78,163,214,.45)", borderRadius: 14, padding: "18px 22px", marginBottom: 28 }}>
            <div className="eyebrow" style={{ color: "var(--gold)", marginBottom: 12 }}>Top market standings · average points per person</div>
            {marketStandings.slice(0, 5).map((m, i) => (
              <div key={m.market} style={{ display: "flex", alignItems: "center", gap: 16, padding: "9px 0", borderBottom: i < Math.min(5, marketStandings.length) - 1 ? "1px solid rgba(255,255,255,.08)" : "none" }}>
                <span style={{ width: 32, fontFamily: "'Space Mono',monospace", fontWeight: 700, fontSize: 22, color: i === 0 ? "var(--gold)" : "#6f8893" }}>{i + 1}</span>
                <span style={{ flex: 1, fontSize: 22, fontWeight: 800 }}>{m.market}<span style={{ color: "#9fb4bd", fontSize: 15, fontWeight: 600, marginLeft: 10 }}>{m.count} {m.count === 1 ? "person" : "people"}</span></span>
                <span style={{ fontSize: 26, fontWeight: 900, fontFamily: "'Space Mono',monospace", color: i === 0 ? "var(--gold)" : "#fff" }}>{m.avg}</span>
              </div>
            ))}
          </div>
        )}
        {rows.length === 0 && <p style={{ color: "#9fb4bd" }}>Waiting for the first connections…</p>}
        {rows.map((r, i) => (
          <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 20, padding: "16px 0", borderBottom: "1px solid rgba(255,255,255,.1)" }}>
            <span style={{ width: 50, fontFamily: "'Space Mono',monospace", fontWeight: 700, fontSize: 28, color: i < 3 ? "var(--gold)" : "#6f8893" }}>{i + 1}</span>
            <div style={{ flex: 1 }}>
              <span style={{ fontSize: 24, fontWeight: 800 }}>{r.name}</span>
              <span style={{ marginLeft: 12, color: "#9fb4bd", fontSize: 16 }}>{r.market}</span>
            </div>
            <span style={{ fontSize: 30, fontWeight: 900, fontFamily: "'Space Mono',monospace" }}>{r.total}</span>
          </div>
        ))}
      </div>
      <div className="credit" style={{ padding: "10px 0 16px" }}>Developed by <a href="https://www.linkedin.com/in/ashleighroberts/" target="_blank" rel="noopener noreferrer">Ash Roberts</a></div>
    </div>
  );
}

/* ============================================================================
   ADMIN / GAMESMASTER — open with ?admin
============================================================================ */
function Admin({ onExit, onScreen }) {
  const [ok, setOk] = useState(false);
  const [pin, setPin] = useState("");
  if (!ok) return (
    <div className="gcq"><div className="wrap" style={{ justifyContent: "center" }}>
      <div className="card">
        <div className="eyebrow" style={{ color: "var(--navy)" }}>Gamesmaster access</div>
        <input className="input" style={{ marginTop: 10 }} type="password" placeholder="PIN" value={pin}
          onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && setOk(pin === ADMIN_PIN)} />
        <button className="btn btn-navy" style={{ marginTop: 10 }} onClick={() => setOk(pin === ADMIN_PIN)}>Enter</button>
        <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={onExit}>Back</button>
      </div>
    </div></div>
  );
  return <AdminPanel onExit={onExit} onScreen={onScreen} />;
}

function AdminPanel({ onExit, onScreen }) {
  const [users, setUsers] = useState([]);
  const [scores, setScores] = useState([]);
  const [flash, setFlashState] = useState(null);
  const [msg, setMsg] = useState("");
  const [search, setSearch] = useState("");
  const [boost, setBoost] = useState({ code: "", pts: "50", reason: "" });
  const [bonus, setBonus] = useState({ code: "", pts: "50", label: "", uses: "" });
  const [bonusList, setBonusList] = useState([]);
  const [bonusUses, setBonusUses] = useState({});
  const [ann, setAnn] = useState("");
  const [annMins, setAnnMins] = useState("5");
  const [annLive, setAnnLive] = useState(null);

  const load = useCallback(async () => {
    const us = await sgetAll("users:"); setUsers(us);
    const ss = (await sgetAll("score:")).sort((a, b) => (b.total || 0) - (a.total || 0)); setScores(ss);
    const bs = (await sgetAll("bonus:")).sort((a, b) => (b.ts || 0) - (a.ts || 0)); setBonusList(bs);
    const uses = {};
    for (const b of bs) { const uk2 = await slist("bonusUse:" + b.code + ":"); uses[b.code] = uk2.length; }
    setBonusUses(uses);
    const fl = await sget("flash:current"); setFlashState(fl && fl.endsAt > Date.now() ? fl : null);
    const an = await sget("announce:current"); setAnnLive(an && an.endsAt > Date.now() ? an : null);
  }, []);
  useEffect(() => { load(); const t = setInterval(load, 15000); return () => clearInterval(t); }, [load]);

  // table standings — join scores (totals) with users (table numbers)
  const tableOf = {};
  users.forEach((u) => { if (u.table) tableOf[u.id] = String(u.table); });
  const tAgg = {};
  scores.forEach((s) => { const t = tableOf[s.id]; if (!t) return; if (!tAgg[t]) tAgg[t] = { total: 0, count: 0 }; tAgg[t].total += (s.total || 0); tAgg[t].count += 1; });
  const tableRanks = Object.entries(tAgg).map(([t, v]) => ({ table: t, total: v.total, count: v.count, avg: Math.round(v.total / v.count) })).sort((a, b) => b.total - a.total);

  const dist = {};
  scores.forEach((s) => { dist[s.market] = (dist[s.market] || 0) + 1; });
  const maxd = Math.max(1, ...Object.values(dist));

  async function trigger(title, desc, mult, mins) {
    const f = { id: eid(), title, desc, mult, endsAt: Date.now() + mins * 60000 };
    await sset("flash:current", f); setFlashState(f); flashMsg(`Flash live: ${title}`);
  }
  async function stopFlash() { await sset("flash:current", null); setFlashState(null); flashMsg("Flash stopped"); }
  async function sendAnnounce(text) {
    const t = (text != null ? text : ann).trim();
    if (!t) { flashMsg("Type a message first"); return; }
    const mins = Math.max(1, parseInt(annMins, 10) || 5);
    const a = { id: eid(), text: t, endsAt: Date.now() + mins * 60000 };
    await sset("announce:current", a); setAnnLive(a); flashMsg("Announcement sent");
  }
  async function clearAnnounce() { await sset("announce:current", null); setAnnLive(null); flashMsg("Announcement cleared"); }
  function flashMsg(m) { setMsg(m); setTimeout(() => setMsg(""), 2500); }

  async function giveBoost() {
    const c = boost.code.trim(); const p = parseInt(boost.pts, 10);
    if (!/^\d{3}$/.test(c) || !p) { flashMsg("Enter a valid code and points"); return; }
    const idx = await sget("code:" + c);
    if (!idx) { flashMsg("Code not found"); return; }
    const ev = { id: eid(), type: "boost", points: p, fromId: "gamesmaster", fromName: "Gamesmaster", fromMarket: "", reason: boost.reason, ts: Date.now() };
    await sset("inbox:" + idx.id + ":" + ev.id, ev);
    flashMsg(`+${p} to ${idx.name}`); setBoost({ code: "", pts: "50", reason: "" }); load();
  }

  async function createBonus() {
    const c = bonus.code.trim().toUpperCase().replace(/\s+/g, ""); const p = parseInt(bonus.pts, 10);
    if (!c || !p) { flashMsg("Enter a code and points"); return; }
    const mu = parseInt(bonus.uses, 10) || 0;
    await sset("bonus:" + c, { code: c, points: p, label: bonus.label.trim(), maxUses: mu, ts: Date.now() });
    flashMsg(`Code ${c} saved (+${p}${mu ? `, ${mu} uses` : ""})`); setBonus({ code: "", pts: "50", label: "", uses: "" }); load();
  }

  function editBonus(b) {
    setBonus({ code: b.code, pts: String(b.points || ""), label: b.label || "", uses: b.maxUses ? String(b.maxUses) : "" });
    flashMsg(`Editing ${b.code} — change the fields and Save`);
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  async function deleteBonus(b) {
    if (!window.confirm(`Delete bonus code ${b.code}? It will stop working immediately.`)) return;
    await sset("bonus:" + b.code, null); // soft-delete: redemptions read null and the list filters it out
    flashMsg(`Deleted ${b.code}`); load();
  }

  async function adjust(u, delta) {
    const next = { ...u, selfPoints: (u.selfPoints || 0) + delta };
    await sset("users:" + u.id, next);
    // recompute that user's leaderboard cache from their inbox too
    const ik = await slist("inbox:" + u.id + ":"); let inb = 0;
    for (const k of ik) { const e = await sget(k); if (e) inb += e.points; }
    await sset("score:" + u.id, { id: u.id, name: u.name, market: u.market, total: (next.selfPoints || 0) + inb, table: u.table || "", charity: u.charity || "", newConnections: u.newConnections || 0 });
    flashMsg(`Adjusted ${u.name} by ${delta > 0 ? "+" : ""}${delta}`); load();
  }

  const filtered = search ? users.filter((u) => (u.name + " " + u.email).toLowerCase().includes(search.toLowerCase())) : [];

  return (
    <div className="gcq"><div className="wrap" style={{ paddingTop: 16, paddingBottom: 30 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <h2 className="h1" style={{ color: "#fff", fontSize: 22 }}>Gamesmaster</h2>
        <div style={{ display: "flex", gap: 16 }}>
          <span className="link" style={{ color: "#9fb4bd", fontSize: 13 }} onClick={onExit}>← Home</span>
          {onScreen && <span className="link" style={{ color: "var(--gold)", fontSize: 13 }} onClick={onScreen}>Leaderboard →</span>}
          <span className="link" style={{ color: "#9fb4bd", fontSize: 13 }} onClick={onExit}>Exit</span>
        </div>
      </div>
      {msg && <div className="flash" style={{ marginBottom: 12, background: "var(--green)" }}>{msg}</div>}

      <div className="grid2" style={{ marginBottom: 12 }}>
        <div className="card" style={{ textAlign: "center" }}>
          <div style={{ fontSize: 34, fontWeight: 900, color: "var(--navy)" }}>{users.length}</div>
          <div className="eyebrow" style={{ color: "var(--navy)" }}>Registered</div>
        </div>
        <div className="card" style={{ textAlign: "center" }}>
          <div style={{ fontSize: 34, fontWeight: 900, color: "var(--navy)" }}>{Object.keys(dist).length}</div>
          <div className="eyebrow" style={{ color: "var(--navy)" }}>Markets active</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Market distribution</div>
        {Object.entries(dist).sort((a, b) => b[1] - a[1]).map(([m, n]) => (
          <div className="bar" key={m}>
            <span style={{ width: 86, fontSize: 12, fontWeight: 700 }}>{m}</span>
            <div className="track"><span style={{ width: (n / maxd * 100) + "%" }} /></div>
            <span style={{ width: 22, fontSize: 12, fontWeight: 700, textAlign: "right" }}>{n}</span>
          </div>
        ))}
        {Object.keys(dist).length === 0 && <p className="muted" style={{ fontSize: 13 }}>No registrations yet.</p>}
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Top 10</div>
        {scores.slice(0, 10).map((s, i) => (
          <div className="lb-row" key={s.id}>
            <span className="lb-rank">{i + 1}</span>
            <span style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{s.name}</span>
            <span className="pill">{s.market}</span>
            <span style={{ fontWeight: 900, fontFamily: "'Space Mono',monospace", width: 48, textAlign: "right" }}>{s.total}</span>
          </div>
        ))}
        {scores.length === 0 && <p className="muted" style={{ fontSize: 13 }}>No scores yet.</p>}
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Table standings</div>
        {tableRanks.map((t, i) => (
          <div className="lb-row" key={t.table}>
            <span className="lb-rank">{i + 1}</span>
            <span style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>Table {t.table} <span className="muted" style={{ fontWeight: 600, fontSize: 12 }}>· {t.count} {t.count === 1 ? "person" : "people"} · avg {t.avg}</span></span>
            <span style={{ fontWeight: 900, fontFamily: "'Space Mono',monospace", width: 56, textAlign: "right" }}>{t.total}</span>
          </div>
        ))}
        {tableRanks.length === 0 && <p className="muted" style={{ fontSize: 13 }}>No table data yet.</p>}
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Award points in person (Etiquette boost)</div>
        <input className="input" style={{ marginBottom: 8 }} placeholder="Attendee's 3-digit code" value={boost.code} inputMode="numeric"
          onChange={(e) => setBoost({ ...boost, code: e.target.value.replace(/\D/g, "").slice(0, 3) })} />
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input className="input" style={{ width: 90 }} placeholder="Pts" value={boost.pts} inputMode="numeric" onChange={(e) => setBoost({ ...boost, pts: e.target.value.replace(/\D/g, "") })} />
          <input className="input" placeholder="Reason (optional)" value={boost.reason} onChange={(e) => setBoost({ ...boost, reason: e.target.value })} />
        </div>
        <button className="btn btn-seal" onClick={giveBoost}>Award points</button>
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Offline bonus codes</div>
        <p className="muted" style={{ fontSize: 12, marginBottom: 8 }}>Create a code to announce or hand out. Each person can redeem once; set max uses to cap the total (blank = unlimited).</p>
        <input className="input" style={{ marginBottom: 8, textTransform: "uppercase" }} placeholder="Code, e.g. KEYNOTE" value={bonus.code}
          onChange={(e) => setBonus({ ...bonus, code: e.target.value.toUpperCase().replace(/\s+/g, "") })} />
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input className="input" style={{ width: 80 }} placeholder="Pts" value={bonus.pts} inputMode="numeric" onChange={(e) => setBonus({ ...bonus, pts: e.target.value.replace(/\D/g, "") })} />
          <input className="input" style={{ width: 110 }} placeholder="Max uses" value={bonus.uses} inputMode="numeric" onChange={(e) => setBonus({ ...bonus, uses: e.target.value.replace(/\D/g, "") })} />
          <input className="input" placeholder="Label" value={bonus.label} onChange={(e) => setBonus({ ...bonus, label: e.target.value })} />
        </div>
        <button className="btn btn-navy" onClick={createBonus}>{bonus.code && bonusList.some((b) => b.code === bonus.code.trim().toUpperCase().replace(/\s+/g, "")) ? "Save changes" : "Create code"}</button>
        {bonusList.length > 0 && (
          <div style={{ marginTop: 12 }}>
            {bonusList.map((b) => {
              const used = bonusUses[b.code] || 0;
              const full = b.maxUses > 0 && used >= b.maxUses;
              return (
                <div key={b.code} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderTop: "1px solid var(--line)", fontSize: 13 }}>
                  <span className="mono" style={{ fontWeight: 700, letterSpacing: ".08em" }}>{b.code}</span>
                  <span style={{ flex: 1, margin: "0 10px", minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} className="muted">{b.label || "—"}</span>
                  <span className="muted" style={{ fontSize: 12, marginRight: 8, color: full ? "var(--seal)" : "var(--muted)" }}>{used}{b.maxUses > 0 ? `/${b.maxUses}` : ""} used</span>
                  <span className="pill" style={{ marginRight: 8 }}>+{b.points}</span>
                  <span className="link" style={{ fontSize: 12, marginRight: 8 }} onClick={() => editBonus(b)}>Edit</span>
                  <span className="link" style={{ fontSize: 12, color: "var(--seal)" }} onClick={() => deleteBonus(b)}>Delete</span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Broadcast announcement</div>
        <p className="muted" style={{ fontSize: 12, marginBottom: 8 }}>Shows as a banner to everyone, everywhere in the game and on the big screen. For logistics like "Take your seats" or "See you in Sakura Room". Reaches devices within ~15s.</p>
        {annLive && <div className="flash" style={{ marginBottom: 10, background: "var(--gold,#d4a843)", color: "#1a1f36" }}>Live: {annLive.text} (ends in {Math.max(0, Math.round((annLive.endsAt - Date.now()) / 60000))} min) <span className="link" style={{ color: "#1a1f36", textDecoration: "underline" }} onClick={clearAnnounce}>Clear</span></div>}
        <input className="input" style={{ marginBottom: 8 }} placeholder="Message, e.g. Take your seats" value={ann} onChange={(e) => setAnn(e.target.value)} />
        <div style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
          <input className="input" style={{ width: 90 }} placeholder="Mins" value={annMins} inputMode="numeric" onChange={(e) => setAnnMins(e.target.value.replace(/\D/g, ""))} />
          <button className="btn btn-seal" style={{ flex: 1 }} onClick={() => sendAnnounce()}>Send announcement</button>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {["Take your seats", "Lunch is served", "Session resuming in 5 minutes", "See you in the main hall"].map((p) => (
            <button key={p} className="btn btn-ghost" style={{ padding: "8px 10px", fontSize: 12, flex: "none" }} onClick={() => { setAnn(p); sendAnnounce(p); }}>{p}</button>
          ))}
        </div>
      </div>

      <div className="card" style={{ marginBottom: 12 }}>
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Flash challenge engine</div>
        {flash && <div className="flash" style={{ marginBottom: 10 }}>Live: {flash.title} (ends in {Math.max(0, Math.round((flash.endsAt - Date.now()) / 60000))} min) <span className="link" style={{ color: "#fff", textDecoration: "underline" }} onClick={stopFlash}>Stop</span></div>}
        <button className="btn btn-navy" style={{ marginBottom: 8 }} onClick={() => trigger("Lunch Shuffle", "Double points for connecting with someone whose name starts with a different letter than yours.", 2, 15)}>Lunch Shuffle (×2, 15 min)</button>
        <button className="btn btn-navy" style={{ marginBottom: 8 }} onClick={() => trigger("Hobby Match", "Find someone who shares a hobby category and connect for bonus points.", 2, 10)}>Hobby Match (×2, 10 min)</button>
        <button className="btn btn-navy" onClick={() => trigger("Power Hour", "Every connection counts double across the room.", 2, 20)}>Power Hour (×2, 20 min)</button>
      </div>

      <div className="card">
        <div className="eyebrow" style={{ color: "var(--navy)", marginBottom: 8 }}>Account recovery & point adjustment</div>
        <input className="input" placeholder="Search by name or email" value={search} onChange={(e) => setSearch(e.target.value)} />
        <div style={{ marginTop: 10 }}>
          {filtered.map((u) => {
            const total = (u.selfPoints || 0);
            return (
              <div key={u.id} style={{ borderTop: "1px solid var(--line)", paddingTop: 10, marginTop: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div><p style={{ fontWeight: 800 }}>{u.name}</p><p className="muted" style={{ fontSize: 12 }}>{u.email} · {u.market}{u.team ? ` · ${u.team}` : ""}{u.table ? ` · Table ${u.table}` : ""}</p></div>
                  <div style={{ textAlign: "right" }}><div className="mono" style={{ fontWeight: 700, fontSize: 18, color: "var(--navy)" }}>{u.code}</div><p className="muted" style={{ fontSize: 11 }}>Connect code</p></div>
                </div>
                <p style={{ fontSize: 13, margin: "6px 0" }}>Self points: <b>{total}</b> <span className="muted">(inbound credits add on top)</span></p>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, 50)}>+50</button>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, -50)}>−50</button>
                  <button className="btn btn-ghost" style={{ padding: "8px", fontSize: 13 }} onClick={() => adjust(u, 10)}>+10</button>
                </div>
                <p className="muted" style={{ fontSize: 12, marginTop: 6 }}>Phone died? They simply sign in again with <b>{u.email}</b> to restore this passport and code.</p>
              </div>
            );
          })}
          {search && filtered.length === 0 && <p className="muted" style={{ fontSize: 13, marginTop: 8 }}>No match.</p>}
        </div>
      </div>
    </div></div>
  );
}

function SetupNotice(){return (<div className="gcq"><div className="wrap" style={{justifyContent:"center"}}><Styles /><div className="card"><div className="eyebrow" style={{color:"var(--navy)"}}>Setup needed</div><h2 className="h2" style={{marginTop:6}}>Add your Supabase keys</h2></div></div></div>);}
const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(CONFIGURED ? <App /> : <SetupNotice />);
</script></body></html>
